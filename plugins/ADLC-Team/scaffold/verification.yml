# Verification Gates — ADLC v7
# All commands must exit 0 to pass. Never hardcode commands in skills — read from here.

pre_session:
  deps: "{{DEPS_CHECK}}"

post_task:
  build: "{{BUILD_CMD}}"
  lint: "{{LINT_CMD}}"
  test: "{{TEST_CMD}}"

post_slice:
  build: "{{BUILD_CMD}}"
  lint: "{{LINT_CMD}}"
  test_all: "{{TEST_ALL_CMD}}"
  typecheck: "{{TYPECHECK_CMD}}"
  # coverage: "{{COVERAGE_CMD}}"  # Uncomment when coverage threshold is set
